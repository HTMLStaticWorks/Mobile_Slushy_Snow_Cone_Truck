<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slushy Splash - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">`n</head>
<body class="auth-page">

    <!-- Theme & RTL Toggles for Auth Page -->
    <div style="position: fixed; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000;">
        <button class="nav-btn rtl-toggle" title="Toggle RTL" style="background: var(--card-bg); box-shadow: var(--shadow); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%;">🔄</button>
        <button class="nav-btn theme-toggle" title="Toggle Theme" style="background: var(--card-bg); box-shadow: var(--shadow); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%;">🌙</button>
    </div>

    <div class="card auth-card">
        <a href="index.html" class="logo auth-card-logo">
            <svg width="60" height="60" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M30 35 L70 35 L62 90 L38 90 Z" fill="var(--primary)" />
                <path d="M30 35 Q50 15 70 35" fill="var(--secondary)" opacity="0.8" />
                <path d="M48 35 L52 10" stroke="#333" stroke-width="4" stroke-linecap="round" />
            </svg>
            Slushy <span>Splash</span>
        </a>
        <h1 class="text-center">Join the Splash!</h1>
        <p class="text-center" style="margin-bottom: 30px;">Create an account to star events.</p>
        
        <form>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Your Full Name" class="form-input" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="example@email.com" class="form-input" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Create a password" class="form-input" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="Confirm your password" class="form-input" required>
            </div>
            
            <div style="margin-bottom: 25px; text-align: left;">
                <label style="display: block; font-size: 14px;">
                    <input type="checkbox" required style="margin-right: 8px;"> I accept the Terms & Conditions
                </label>
            </div>
            
            <button type="submit" class="btn btn-primary btn-auth">Register</button>
        </form>
        
        <div class="divider">
            <span>OR</span>
        </div>
        
        <div class="flex-center" style="flex-direction: row; gap: 20px; margin-top: 10px;">
            <button class="social-icon-btn" title="Continue with Google" style="background: white; border: 1px solid #DB4437; color: #DB4437; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: var(--transition);">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            </button>
            <button class="social-icon-btn" title="Continue with Email" style="background: #201335; color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: var(--transition);">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
            </button>
        </div>
        
        <div class="text-center" style="margin-top: 30px;">
            Already have an account? <a href="login.html" style="font-weight: bold; color: var(--secondary); text-decoration: underline;">Login</a>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
