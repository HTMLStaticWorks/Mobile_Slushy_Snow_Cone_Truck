<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slushy Splash - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

    <!-- Theme & RTL Toggles for Auth Page -->
    <div style="position: fixed; top: 20px; right: 20px; display: flex; gap: 10px; z-index: 1000;">
        <button class="nav-btn rtl-toggle" title="Toggle RTL" style="background: var(--card-bg); box-shadow: var(--shadow); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%;">🔄</button>
        <button class="nav-btn theme-toggle" title="Toggle Theme" style="background: var(--card-bg); box-shadow: var(--shadow); width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%;">🌙</button>
    </div>

    <div class="card auth-card">
        <a href="index.html" class="logo text-center" style="display: block; margin-bottom: 30px;">
            <svg width="60" height="60" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" style="display: block; margin: 0 auto 15px;">
                <path d="M30 35 L70 35 L62 90 L38 90 Z" fill="var(--primary)" />
                <path d="M30 35 Q50 15 70 35" fill="var(--secondary)" opacity="0.8" />
                <path d="M48 35 L52 10" stroke="#333" stroke-width="4" stroke-linecap="round" />
            </svg>
            Slushy <span>Splash</span>
        </a>
        <h1 class="text-center">Welcome Back to Slushy Splash!</h1>
        <p class="text-center" style="margin-bottom: 30px;">Login to manage your event bookings and favorite flavors.</p>
        
        <form>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="example@email.com" class="form-input" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Your password" class="form-input" required>
            </div>
            <div style="text-align: right; margin-bottom: 20px;">
                <a href="#" style="font-size: 14px; text-decoration: underline;">Forgot Password?</a>
            </div>
            <button type="submit" class="btn btn-primary btn-auth">Login</button>
        </form>
        
        <div class="divider">
            <span>OR</span>
        </div>
        
        <button class="btn btn-google">Continue with Google</button>
        <button class="btn btn-email">Continue with Email</button>
        
        <div class="text-center" style="margin-top: 30px;">
            Don't have an account? <a href="register.html" style="font-weight: bold; color: var(--secondary); text-decoration: underline;">Register</a>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
