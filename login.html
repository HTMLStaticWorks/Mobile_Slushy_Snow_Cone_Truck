<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slushy Splash - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Outfit:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    
    <link rel="icon" type="image/svg+xml" href="favicon.svg"></head>
    
<body class="auth-page">

    <!-- Theme & RTL Toggles for Auth Page -->
    <div class="auth-toggles">
        <button class="nav-btn rtl-toggle auth-toggle-btn" title="Toggle RTL">RTL</button>
        <button class="nav-btn theme-toggle auth-toggle-btn" title="Toggle Theme">🌙</button>
    </div>

    <div class="card auth-card">
        <a href="index.html" class="logo auth-card-logo">
            <svg width="60" height="60" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M30 35 L70 35 L62 90 L38 90 Z" fill="var(--primary)" />
                <path d="M30 35 Q50 15 70 35" fill="var(--secondary)" opacity="0.8" />
                <path d="M48 35 L52 10" stroke="#333" stroke-width="4" stroke-linecap="round" />
            </svg>
            Slushy <span>Splash</span>
        </a>
        <h1 class="text-center">Welcome Back!</h1>
        <p class="text-center" style="margin-bottom: 30px;">Login to manage your flavors.</p>
        
        <form>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="" class="form-input" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="" class="form-input" required>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <label style="font-size: 14px; display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-dark);">
                    <input type="checkbox" style="width: 18px; height: 18px; accent-color: var(--primary); cursor: pointer;"> Remember Me
                </label>
                <a href="#" style="font-size: 14px; text-decoration: underline; color: var(--secondary); font-weight: 500;">Forgot Password?</a>
            </div>
            <button type="submit" class="btn btn-primary btn-auth">Login</button>
        </form>
        
        <div class="divider">
            <span>OR</span>
        </div>
        
        <div class="flex-center" style="flex-direction: row; gap: 20px; margin-top: 10px;">
            <button class="social-icon-btn" title="Continue with Google" style="background: var(--card-bg); border: 1px solid #ddd; color: #DB4437; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: var(--transition);">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            </button>
            <button class="social-icon-btn" title="Continue with Apple" style="background: var(--text-dark); color: var(--text-light); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: var(--transition);">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.078-2.04 0-3.905 1.154-4.966 3.004-2.112 3.703-.539 9.17 1.507 12.113 1.002 1.44 2.188 3.055 3.754 3.055 1.507 0 2.079-.923 3.905-.923s2.342.923 3.905.923c1.564 0 2.628-1.458 3.585-2.858 1.108-1.603 1.562-3.153 1.581-3.23-.035-.016-3.047-1.171-3.078-4.66.027-2.924 2.427-4.321 2.536-4.383-1.365-1.996-3.468-2.221-4.215-2.274-1.986-.145-3.054 1.309-4.054 1.309zm4.24-4.832c.895-1.084.895-2.064.895-2.064s-.979.043-2.094 1.171c-1.124 1.154-1.047 2.134-1.047 2.134s.96.115 2.246-1.241z"/>
                </svg>
            </button>
            <button class="social-icon-btn" title="Continue with Email" style="background: var(--card-bg); border: 1px solid #ddd; color: var(--text-dark); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: var(--transition);">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
            </button>
        </div>
        
        <div class="text-center" style="margin-top: 30px;">
            Don't have an account? <a href="register.html" style="font-weight: bold; color: var(--secondary); text-decoration: underline;">Register</a>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
